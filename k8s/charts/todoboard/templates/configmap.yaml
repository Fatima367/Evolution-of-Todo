apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todoboard.fullname" . }}-config
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
data:
  # Frontend configuration
  NEXT_PUBLIC_API_URL: "http://{{ include "todoboard.fullname" . }}-backend:{{ .Values.backend.service.port }}"
  # Backend configuration
  DATABASE_URL: "postgresql://{{ .Values.postgres.env.POSTGRES_USER }}:{{ .Values.postgres.env.POSTGRES_PASSWORD }}@{{ include "todoboard.fullname" . }}-postgres:{{ .Values.postgres.service.port }}/{{ .Values.postgres.env.POSTGRES_DB }}"
  # Other environment variables can be added here