apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todoboard.fullname" . }}-secrets
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ .Values.postgres.postgresPassword | b64enc | quote }}
  openai-api-key: {{ .Values.backend.openaiApiKey | default "your-openai-key-here" | b64enc | quote }}