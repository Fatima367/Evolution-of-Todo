# Minikube-specific overrides

# Use LoadBalancer with Minikube tunnel
frontend:
  service:
    type: "LoadBalancer"
    port: 3000

# PostgreSQL with appropriate settings for Minikube
postgres:
  persistence:
    storageClass: "standard"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"