# Minikube-specific values for todoboard Helm chart
# Override default values for local development with Minikube

#############################################################################
# Global Configuration
#############################################################################

global:
  environment: development
  imagePullPolicy: IfNotPresent

#############################################################################
# Backend Configuration
#############################################################################

backend:
  replicaCount: 1

  image:
    repository: todoboard-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "1024Mi"

  env:
    LOG_LEVEL: "DEBUG"
  livenessProbe:
    enabled: false
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    enabled: false
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 120
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

#############################################################################
# Frontend Configuration
#############################################################################

frontend:
  replicaCount: 1

  image:
    repository: todoboard-frontend
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  service:
    type: NodePort
    port: 3000
    nodePort: 30000

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  env:
    NODE_ENV: "development"

  apiUrl: "http://todoboard-backend:8000"

#############################################################################
# Database Configuration
#############################################################################

postgresql:
  replicaCount: 1

  image:
    repository: postgres
    tag: "16-alpine"

  persistence:
    enabled: true
    storageClass: "standard"
    size: "5Gi"
    subPath: "postgres-clean"

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  securityContext:
    runAsNonRoot: false
    runAsUser: 999
    fsGroup: 999

#############################################################################
# Database Migration Configuration
#############################################################################

migration:
  enabled: true

  image:
    repository: todoboard-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  command:
    - /bin/sh
    - -c
    - |
      echo "Waiting for database..."
      python -c "
      import socket, os, time, sys
      from urllib.parse import urlparse
      u = urlparse(os.environ['DATABASE_URL'])
      host = u.hostname
      port = u.port or 5432
      print(f'Waiting for {host}:{port}...')
      for i in range(60):
          try:
              with socket.create_connection((host, port), timeout=2):
                  print('Connected!')
                  sys.exit(0)
          except Exception:
              time.sleep(2)
      print('Timeout waiting for database')
      sys.exit(1)
      "
      echo "Running database migrations..."
      alembic upgrade head
      echo "Migrations completed successfully"

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  hookAnnotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation

#############################################################################
# ConfigMap Configuration
#############################################################################

configMap:
  backend:
    # SECURITY: Replace "your-database-password" with actual password before deployment
    # See QUICKSTART.md for setup instructions
    DATABASE_URL: "postgresql://postgres:your-database-password@todoboard-postgres:5432/todoboard"
    CORS_ORIGINS: '["http://localhost:3000","http://localhost:30000"]'
    LOG_LEVEL: "DEBUG"

  frontend:
    NEXT_PUBLIC_API_URL: "http://todoboard-backend:8000"
    NODE_ENV: "development"

#############################################################################
# Secret Configuration
#############################################################################

secrets:
  # Set to false - secrets should be created manually using kubectl
  # See QUICKSTART.md Step 3 for instructions:
  # TODO: Change password before deployment
  # kubectl create secret generic app-secrets \
  #   --from-literal=POSTGRES_PASSWORD=your-database-password \
  #   --from-literal=JWT_SECRET_KEY=your-jwt-secret-key \
  #   --from-literal=GROQ_API_KEY=your-groq-api-key
  create: false
  data:
    POSTGRES_PASSWORD: ""
    JWT_SECRET_KEY: ""
    GROQ_API_KEY: ""

#############################################################################
# Optional Features (Disabled for Minikube)
#############################################################################

ingress:
  enabled: false

networkPolicy:
  enabled: false

autoscaling:
  enabled: false

monitoring:
  enabled: false
