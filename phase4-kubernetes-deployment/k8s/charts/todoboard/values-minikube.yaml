# Minikube-specific overrides for todoboard chart

# Use LoadBalancer with Minikube tunnel
frontend:
  service:
    type: "LoadBalancer"

# Use standard storage class for Minikube
postgres:
  persistence:
    storageClass: "standard"

# Reduce resource requirements for local development
frontend:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

backend:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

postgres:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"