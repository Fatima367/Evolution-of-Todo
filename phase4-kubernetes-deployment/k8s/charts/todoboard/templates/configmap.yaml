apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todoboard.fullname" . }}-config
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
data:
  # Add any non-sensitive configuration here
  NODE_ENV: "production"
  PYTHON_ENV: "production"
  LOG_LEVEL: "info"
  {{- range $key, $value := .Values.config.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}