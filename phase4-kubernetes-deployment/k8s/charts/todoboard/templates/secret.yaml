apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todoboard.fullname" . }}-secrets
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
type: Opaque
data:
  # These should be provided by the user
  # Example values encoded in base64
  postgres-db: dG9kb2JvYXJk # "todoboard" in base64
  postgres-user: dG9kb2JvYXJk # "todoboard" in base64
  postgres-password: cGFzc3dvcmQ= # "password" in base64
  postgres-url: cG9zdGdyZXNxbDp0b2RvYm9hcmQ6cGFzc3dvcmRAcG9zdGJvYXJkLXBvc3RncmVzOjU0MzIvdG9kb2JvYXJk # "postgresql:todoboard:password@todoboard-postgres:5432/todoboard" in base64
  openai-api-key: "" # Empty by default, needs to be provided
  better-auth-secret: "" # Empty by default, needs to be provided