# Default values for todoboard Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

#############################################################################
# Global Configuration
#############################################################################

global:
  appName: todoboard
  environment: development
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

#############################################################################
# Backend Configuration (FastAPI)
#############################################################################

backend:
  enabled: true
  replicaCount: 1

  image:
    repository: todoboard-backend
    tag: "0.1.0"
    pullPolicy: ""

  containerPort: 8000

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    nodePort: null

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  env:
    LOG_LEVEL: "INFO"
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false

  nodeSelector: {}
  tolerations: []
  affinity: {}

#############################################################################
# Frontend Configuration (Next.js)
#############################################################################

frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: todoboard-frontend
    tag: "0.1.0"
    pullPolicy: ""

  containerPort: 3000

  service:
    type: NodePort
    port: 3000
    targetPort: 3000
    nodePort: 30000

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  env:
    NODE_ENV: "production"
    NEXT_PUBLIC_APP_NAME: "TodoBoard"

  apiUrl: "http://todoboard-backend:8000"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false

  nodeSelector: {}
  tolerations: []
  affinity: {}

#############################################################################
# Database Configuration (PostgreSQL)
#############################################################################

postgresql:
  enabled: true
  replicaCount: 1

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  containerPort: 5432

  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  livenessProbe:
    enabled: true
    exec:
      command:
        - /bin/sh
        - -c
        - pg_isready -U postgres
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    exec:
      command:
        - /bin/sh
        - -c
        - pg_isready -U postgres
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  auth:
    database: todoboard
    username: postgres
    password: ""
    existingSecret: ""

  persistence:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: "5Gi"
    mountPath: /var/lib/postgresql/data
    subPath: postgres-clean

  securityContext:
    runAsNonRoot: false
    runAsUser: 999
    fsGroup: 999

  nodeSelector: {}
  tolerations: []
  affinity: {}

#############################################################################
# Database Migration Configuration
#############################################################################

migration:
  enabled: true

  image:
    repository: todoboard-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  command:
    - /bin/sh
    - -c
    - |
      echo "Waiting for database..."
      python -c "
      import socket, os, time, sys
      from urllib.parse import urlparse
      u = urlparse(os.environ['DATABASE_URL'])
      host = u.hostname
      port = u.port or 5432
      print(f'Waiting for {host}:{port}...')
      for i in range(60):
          try:
              with socket.create_connection((host, port), timeout=2):
                  print('Connected!')
                  sys.exit(0)
          except Exception:
              time.sleep(2)
      print('Timeout waiting for database')
      sys.exit(1)
      "
      echo "Running database migrations..."
      alembic upgrade head
      echo "Migrations completed successfully"

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  hookAnnotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation

#############################################################################
# ConfigMap Configuration
#############################################################################

configMap:
  backend:
    DATABASE_URL: "postgresql://postgres:changeme@todoboard-postgres:5432/todoboard"
    CORS_ORIGINS: '["http://localhost:3000","http://localhost:30000"]'
    LOG_LEVEL: "INFO"
    API_PREFIX: "/api/v1"

  frontend:
    NEXT_PUBLIC_API_URL: "http://todoboard-backend:8000"
    NEXT_PUBLIC_APP_NAME: "TodoBoard"
    NODE_ENV: "production"

#############################################################################
# Secret Configuration
#############################################################################

secrets:
  create: false
  data:
    POSTGRES_PASSWORD: "changeme"
    JWT_SECRET_KEY: "your-jwt-secret-key-change-in-production"
    GROQ_API_KEY: ""

#############################################################################
# Ingress Configuration (Optional)
#############################################################################

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: todoboard.local
      paths:
        - path: /
          pathType: Prefix
          service:
            name: todoboard-frontend
            port: 3000
        - path: /api
          pathType: Prefix
          service:
            name: todoboard-backend
            port: 8000
  tls: []

#############################################################################
# Network Policy Configuration (Optional)
#############################################################################

networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

#############################################################################
# Service Account Configuration
#############################################################################

serviceAccount:
  create: true
  name: ""
  annotations: {}

#############################################################################
# Pod Disruption Budget (Optional)
#############################################################################

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: null

#############################################################################
# Horizontal Pod Autoscaler (Optional)
#############################################################################

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

#############################################################################
# Monitoring Configuration (Optional)
#############################################################################

monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
