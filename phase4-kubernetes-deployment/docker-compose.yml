version: '3.8'

services:
  frontend:
    build:
      context: ../phase3-todo-ai-chatbot/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - todoboard-network

  backend:
    build:
      context: ../phase3-todo-ai-chatbot/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://todoboard:password@postgres:5432/todoboard
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
    networks:
      - todoboard-network

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=todoboard
      - POSTGRES_USER=todoboard
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todoboard-network

volumes:
  postgres_data:

networks:
  todoboard-network:
    driver: bridge