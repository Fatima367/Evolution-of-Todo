# OpenTelemetry Collector Configuration
# This configuration defines how telemetry data (traces, metrics, logs) is received, processed, and exported

receivers:
  # OTLP receiver for traces, metrics, and logs
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

  # Prometheus receiver for scraping metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

  # Jaeger receiver for legacy Jaeger traces
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268

  # Zipkin receiver for legacy Zipkin traces
  zipkin:
    endpoint: 0.0.0.0:9411

processors:
  # Batch processor to batch telemetry data before export
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Resource processor to add/modify resource attributes
  resource:
    attributes:
      - key: service.namespace
        value: todoboard
        action: upsert
      - key: deployment.environment
        value: production
        action: upsert
      - key: cloud.provider
        value: aws
        action: upsert

  # Attributes processor to modify span/log attributes
  attributes:
    actions:
      - key: http.user_agent
        action: delete
      - key: net.peer.ip
        action: hash

  # Span processor for trace sampling and filtering
  probabilistic_sampler:
    sampling_percentage: 100
    hash_seed: 22

  # Filter processor to drop unwanted telemetry
  filter:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - ".*grpc_io.*"

  # Resource detection processor
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 5s

exporters:
  # Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: todoboard
    const_labels:
      environment: production

  # OTLP exporter for traces to Jaeger
  otlp/jaeger:
    endpoint: jaeger-collector:4317
    tls:
      insecure: true

  # Logging exporter for debugging
  logging:
    loglevel: info
    sampling_initial: 5
    sampling_thereafter: 200

  # Kafka exporter for streaming telemetry data
  kafka:
    brokers:
      - kafka:9092
    topic: telemetry-data
    encoding: otlp_proto
    producer:
      max_message_bytes: 10000000
      compression: gzip

  # File exporter for backup/archival
  file:
    path: /var/log/otel/telemetry.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 3

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

  # Performance profiler
  pprof:
    endpoint: 0.0.0.0:1777

  # zPages for debugging
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [memory_limiter, resourcedetection, resource, attributes, probabilistic_sampler, batch]
      exporters: [otlp/jaeger, logging, kafka]

    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resourcedetection, resource, filter, batch]
      exporters: [prometheus, logging, kafka]

    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, attributes, batch]
      exporters: [logging, kafka, file]

  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      address: 0.0.0.0:8888
