# Prometheus Alerting Rules for TodoBoard Application
# This file defines alerting rules for monitoring application health and performance

groups:
  # Application Health Alerts
  - name: application_health
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "High error rate detected in {{ $labels.service }}"
          description: "Service {{ $labels.service }} has an error rate of {{ $value | humanizePercentage }} (threshold: 5%)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#high-error-rate"

      # Service down alert
      - alert: ServiceDown
        expr: up{job=~"todoboard-.*|notification-service|recurring-task-service|audit-service"} == 0
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} on instance {{ $labels.instance }} has been down for more than 2 minutes"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#service-down"

      # High latency alert
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
          ) > 1.0
        for: 10m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High latency detected in {{ $labels.service }}"
          description: "Service {{ $labels.service }} has p95 latency of {{ $value }}s (threshold: 1s)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#high-latency"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          (
            db_connection_pool_active
            /
            db_connection_pool_max
          ) > 0.9
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection pool is {{ $value | humanizePercentage }} full (threshold: 90%)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#database-connection-pool"

  # Resource Utilization Alerts
  - name: resource_utilization
    interval: 30s
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          (
            sum(rate(container_cpu_usage_seconds_total{namespace="todoboard"}[5m])) by (pod)
            /
            sum(container_spec_cpu_quota{namespace="todoboard"} / container_spec_cpu_period{namespace="todoboard"}) by (pod)
          ) > 0.8
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of CPU (threshold: 80%)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#high-cpu-usage"

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          (
            sum(container_memory_working_set_bytes{namespace="todoboard"}) by (pod)
            /
            sum(container_spec_memory_limit_bytes{namespace="todoboard"}) by (pod)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of memory (threshold: 85%)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#high-memory-usage"

      # Pod restart rate
      - alert: HighPodRestartRate
        expr: |
          rate(kube_pod_container_status_restarts_total{namespace="todoboard"}[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High restart rate for pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is restarting frequently ({{ $value }} restarts/sec)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#pod-restarts"

  # Kafka Alerts
  - name: kafka_health
    interval: 30s
    rules:
      # Kafka consumer lag
      - alert: KafkaConsumerLag
        expr: |
          kafka_consumergroup_lag > 1000
        for: 10m
        labels:
          severity: warning
          component: messaging
        annotations:
          summary: "High Kafka consumer lag in {{ $labels.consumergroup }}"
          description: "Consumer group {{ $labels.consumergroup }} has a lag of {{ $value }} messages on topic {{ $labels.topic }}"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#kafka-consumer-lag"

      # Kafka broker down
      - alert: KafkaBrokerDown
        expr: kafka_brokers < 3
        for: 5m
        labels:
          severity: critical
          component: messaging
        annotations:
          summary: "Kafka broker count is low"
          description: "Only {{ $value }} Kafka brokers are available (expected: 3)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#kafka-broker-down"

  # Database Alerts
  - name: database_health
    interval: 30s
    rules:
      # Database connection failures
      - alert: DatabaseConnectionFailures
        expr: |
          rate(db_connection_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "High rate of database connection failures"
          description: "Database connection failure rate is {{ $value }} errors/sec"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#database-connection-failures"

      # Slow queries
      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(db_query_duration_seconds_bucket[5m])) by (le)
          ) > 5.0
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "p95 query duration is {{ $value }}s (threshold: 5s)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#slow-queries"

  # Business Metrics Alerts
  - name: business_metrics
    interval: 1m
    rules:
      # Task creation rate drop
      - alert: TaskCreationRateDrop
        expr: |
          (
            rate(tasks_created_total[1h])
            /
            rate(tasks_created_total[1h] offset 24h)
          ) < 0.5
        for: 30m
        labels:
          severity: warning
          component: business
        annotations:
          summary: "Task creation rate has dropped significantly"
          description: "Task creation rate is {{ $value | humanizePercentage }} of yesterday's rate"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#task-creation-drop"

      # Failed notification rate
      - alert: HighNotificationFailureRate
        expr: |
          (
            sum(rate(notifications_failed_total[5m]))
            /
            sum(rate(notifications_sent_total[5m]))
          ) > 0.1
        for: 10m
        labels:
          severity: warning
          component: notifications
        annotations:
          summary: "High notification failure rate"
          description: "Notification failure rate is {{ $value | humanizePercentage }} (threshold: 10%)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#notification-failures"

  # Kubernetes Cluster Alerts
  - name: kubernetes_cluster
    interval: 30s
    rules:
      # Node not ready
      - alert: KubernetesNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Kubernetes node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been in NotReady state for more than 5 minutes"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#node-not-ready"

      # Persistent volume usage
      - alert: PersistentVolumeUsageHigh
        expr: |
          (
            kubelet_volume_stats_used_bytes{namespace="todoboard"}
            /
            kubelet_volume_stats_capacity_bytes{namespace="todoboard"}
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Persistent volume {{ $labels.persistentvolumeclaim }} is nearly full"
          description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full (threshold: 85%)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#pvc-full"

      # Pod pending
      - alert: PodPending
        expr: kube_pod_status_phase{namespace="todoboard",phase="Pending"} == 1
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Pod {{ $labels.pod }} is stuck in Pending state"
          description: "Pod {{ $labels.pod }} has been in Pending state for more than 10 minutes"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#pod-pending"

  # Security Alerts
  - name: security
    interval: 1m
    rules:
      # High rate of authentication failures
      - alert: HighAuthenticationFailureRate
        expr: |
          rate(auth_failures_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: security
        annotations:
          summary: "High rate of authentication failures"
          description: "Authentication failure rate is {{ $value }} failures/sec (threshold: 10/sec)"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#auth-failures"

      # Suspicious activity - multiple failed logins from same IP
      - alert: SuspiciousLoginActivity
        expr: |
          sum(rate(auth_failures_total[5m])) by (source_ip) > 5
        for: 2m
        labels:
          severity: critical
          component: security
        annotations:
          summary: "Suspicious login activity from {{ $labels.source_ip }}"
          description: "IP {{ $labels.source_ip }} has {{ $value }} failed login attempts/sec"
          runbook_url: "https://github.com/your-org/todoboard/blob/main/docs/runbook.md#suspicious-activity"
