apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: todoboard
  labels:
    app.kubernetes.io/name: kafka-metrics
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: todoboard
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
    # Kafka broker metrics
    - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
        clientId: "$3"
        topic: "$4"
        partition: "$5"
    - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
        clientId: "$3"
        broker: "$4:$5"
    - pattern: kafka.server<type=(.+), name=(.+)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
    # Kafka network metrics
    - pattern: kafka.network<type=(.+), name=(.+), request=(.+)><>Value
      name: kafka_network_$1_$2
      type: GAUGE
      labels:
        request: "$3"
    # Kafka log metrics
    - pattern: kafka.log<type=(.+), name=(.+), topic=(.+), partition=(.+)><>Value
      name: kafka_log_$1_$2
      type: GAUGE
      labels:
        topic: "$3"
        partition: "$4"
    # Kafka controller metrics
    - pattern: kafka.controller<type=(.+), name=(.+)><>Value
      name: kafka_controller_$1_$2
      type: GAUGE

  zookeeper-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
    # Zookeeper metrics
    - pattern: "org.apache.ZooKeeperService<name0=(.+)><>(.+)"
      name: zookeeper_$2
      type: GAUGE
    - pattern: "org.apache.ZooKeeperService<name0=(.+), name1=(.+)><>(.+)"
      name: zookeeper_$3
      type: GAUGE
      labels:
        name0: "$1"
        name1: "$2"
