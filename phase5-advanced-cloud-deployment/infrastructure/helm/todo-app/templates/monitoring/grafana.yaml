{{- if .Values.monitoring.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todoboard.fullname" . }}-grafana-datasources
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "todoboard.fullname" . }}-prometheus:{{ .Values.monitoring.prometheus.service.port }}
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 15s

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todoboard.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'TodoBoard Dashboards'
        orgId: 1
        folder: 'TodoBoard'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todoboard.fullname" . }}-grafana-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
type: Opaque
data:
  admin-user: {{ .Values.monitoring.grafana.adminUser | b64enc }}
  admin-password: {{ .Values.monitoring.grafana.adminPassword | b64enc }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "todoboard.fullname" . }}-grafana-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.storage.size }}
  {{- if .Values.monitoring.grafana.storage.storageClass }}
  storageClassName: {{ .Values.monitoring.grafana.storage.storageClass }}
  {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todoboard.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  replicas: {{ .Values.monitoring.grafana.replicas }}
  selector:
    matchLabels:
      {{- include "todoboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "todoboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/monitoring/grafana.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 472
        runAsNonRoot: true
        runAsUser: 472
      containers:
        - name: grafana
          image: "{{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.monitoring.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "todoboard.fullname" . }}-grafana-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "todoboard.fullname" . }}-grafana-credentials
                  key: admin-password
            - name: GF_INSTALL_PLUGINS
              value: {{ .Values.monitoring.grafana.plugins | join "," }}
            - name: GF_SERVER_ROOT_URL
              value: "{{ .Values.monitoring.grafana.rootUrl }}"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "todoboard.fullname" . }}-grafana-storage
        - name: datasources
          configMap:
            name: {{ include "todoboard.fullname" . }}-grafana-datasources
        - name: dashboards-config
          configMap:
            name: {{ include "todoboard.fullname" . }}-grafana-dashboards
        - name: dashboards
          configMap:
            name: {{ include "todoboard.fullname" . }}-grafana-dashboard-files
            optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todoboard.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  type: {{ .Values.monitoring.grafana.service.type }}
  ports:
    - port: {{ .Values.monitoring.grafana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.monitoring.grafana.service.type "NodePort") .Values.monitoring.grafana.service.nodePort }}
      nodePort: {{ .Values.monitoring.grafana.service.nodePort }}
      {{- end }}
  selector:
    {{- include "todoboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana

{{- if .Values.monitoring.grafana.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "todoboard.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
  {{- with .Values.monitoring.grafana.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.monitoring.grafana.ingress.className }}
  ingressClassName: {{ .Values.monitoring.grafana.ingress.className }}
  {{- end }}
  {{- if .Values.monitoring.grafana.ingress.tls }}
  tls:
    {{- range .Values.monitoring.grafana.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.monitoring.grafana.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "todoboard.fullname" $ }}-grafana
                port:
                  number: {{ $.Values.monitoring.grafana.service.port }}
          {{- end }}
    {{- end }}
{{- end }}

{{- end }}
