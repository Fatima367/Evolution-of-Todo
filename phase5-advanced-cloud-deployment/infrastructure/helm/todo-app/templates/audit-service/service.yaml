{{- if .Values.auditService.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todoboard.fullname" . }}-audit-service
  labels:
    {{- include "todoboard.auditService.labels" . | nindent 4 }}
spec:
  type: {{ .Values.auditService.service.type }}
  ports:
    - port: {{ .Values.auditService.service.port }}
      targetPort: {{ .Values.auditService.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "todoboard.auditService.selectorLabels" . | nindent 4 }}
{{- end }}
