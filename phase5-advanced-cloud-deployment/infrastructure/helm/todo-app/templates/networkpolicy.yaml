---
# Network Policy for Notification Service
{{- if .Values.notificationService.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "todoboard.fullname" . }}-notification-service
  labels:
    {{- include "todoboard.notificationService.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "todoboard.notificationService.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from backend (for health checks)
    - from:
      - podSelector:
          matchLabels:
            {{- include "todoboard.backend.selectorLabels" . | nindent 12 }}
      ports:
      - protocol: TCP
        port: {{ .Values.notificationService.containerPort }}
  egress:
    # Allow DNS resolution
    - to:
      - namespaceSelector:
          matchLabels:
            name: kube-system
      ports:
      - protocol: UDP
        port: 53
    # Allow Kafka access
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: kafka
      ports:
      - protocol: TCP
        port: 9092
    # Allow external notification services (Web Push, email, etc.)
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 443
      - protocol: TCP
        port: 80
{{- end }}
---
