{{- if .Values.networkPolicy.enabled -}}
# Network Policy for Backend Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "todoboard.fullname" . }}-backend
  labels:
    {{- include "todoboard.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "todoboard.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from frontend
    - from:
      - podSelector:
          matchLabels:
            {{- include "todoboard.frontend.selectorLabels" . | nindent 12 }}
      ports:
      - protocol: TCP
        port: {{ .Values.backend.containerPort }}
    # Allow traffic from ingress controller
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
      ports:
      - protocol: TCP
        port: {{ .Values.backend.containerPort }}
  egress:
    # Allow DNS resolution
    - to:
      - namespaceSelector:
          matchLabels:
            name: kube-system
      ports:
      - protocol: UDP
        port: 53
    # Allow database access
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: postgresql
      ports:
      - protocol: TCP
        port: 5432
    # Allow Kafka access
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: kafka
      ports:
      - protocol: TCP
        port: 9092
    # Allow external API calls (for Neon DB, Groq API, etc.)
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 443
      - protocol: TCP
        port: 80
---
# Network Policy for Frontend Service
