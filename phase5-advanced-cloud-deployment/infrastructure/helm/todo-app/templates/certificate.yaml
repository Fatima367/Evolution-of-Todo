{{- if .Values.ingress.tls.enabled -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "todoboard.fullname" . }}-tls
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  issuerRef:
    name: {{ .Values.ingress.tls.issuerRef.name }}
    kind: {{ .Values.ingress.tls.issuerRef.kind }}
    {{- if .Values.ingress.tls.issuerRef.group }}
    group: {{ .Values.ingress.tls.issuerRef.group }}
    {{- end }}
  dnsNames:
    {{- range .Values.ingress.hosts }}
    - {{ .host }}
    {{- end }}
  {{- if .Values.ingress.tls.duration }}
  duration: {{ .Values.ingress.tls.duration }}
  {{- end }}
  {{- if .Values.ingress.tls.renewBefore }}
  renewBefore: {{ .Values.ingress.tls.renewBefore }}
  {{- end }}
  privateKey:
    algorithm: {{ .Values.ingress.tls.privateKey.algorithm | default "RSA" }}
    size: {{ .Values.ingress.tls.privateKey.size | default 2048 }}
  usages:
    - digital signature
    - key encipherment
    - server auth
---
{{- if .Values.ingress.tls.createIssuer }}
# ClusterIssuer for Let's Encrypt (Production)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.ingress.tls.acme.email }}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className }}
---
# ClusterIssuer for Let's Encrypt (Staging)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.ingress.tls.acme.email }}
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className }}
{{- end }}
{{- end }}
