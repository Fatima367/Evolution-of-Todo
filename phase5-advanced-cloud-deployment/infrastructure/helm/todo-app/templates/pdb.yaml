    {{- include "todoboard.notificationService.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "todoboard.notificationService.selectorLabels" . | nindent 6 }}
{{- end }}
{{- if .Values.recurringTaskService.enabled }}
---
# Pod Disruption Budget for Recurring Task Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "todoboard.fullname" . }}-recurring-task-service
  labels:
    {{- include "todoboard.recurringTaskService.labels" . | nindent 4 }}
