{{- if .Values.podDisruptionBudget.enabled -}}
# Pod Disruption Budget for Backend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "todoboard.fullname" . }}-backend
  labels:
    {{- include "todoboard.backend.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "todoboard.backend.selectorLabels" . | nindent 6 }}
---
# Pod Disruption Budget for Frontend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "todoboard.fullname" . }}-frontend
  labels:
    {{- include "todoboard.frontend.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "todoboard.frontend.selectorLabels" . | nindent 6 }}
{{- if .Values.notificationService.enabled }}
---
# Pod Disruption Budget for Notification Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
