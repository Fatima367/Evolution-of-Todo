#############################################################################
# Kafka Configuration (Strimzi)
#############################################################################

kafka:
  enabled: true
  # Kafka will be deployed separately via Strimzi operator
  # See infrastructure/kafka/ for Kafka cluster configuration
  bootstrapServers: "todoboard-kafka-kafka-bootstrap.todoboard.svc:9092"

#############################################################################
# Dapr Configuration
#############################################################################

dapr:
  enabled: true
  # Dapr will be installed separately via dapr init -k
  # See infrastructure/dapr/ for Dapr component configurations

#############################################################################
# Ingress Configuration
#############################################################################

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: todoboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls:
    enabled: false

#############################################################################
# ConfigMap Configuration
#############################################################################

configMap:
  backend:
    # Use local PostgreSQL or Neon for development
    DATABASE_URL: "postgresql://todo_user:todo_password@postgres:5432/todo_db"
    JWT_SECRET_KEY: "minikube-dev-secret-key-change-in-production"
    JWT_ALGORITHM: "HS256"
    JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
    CORS_ORIGINS: '["http://todoboard.local", "http://localhost:3000"]'
    APP_NAME: "TodoBoard Minikube"
    APP_VERSION: "1.0.0"
    ENVIRONMENT: "development"
    # Kafka configuration
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.todoboard.svc:9092"
    # Dapr configuration
    DAPR_HTTP_PORT: "3500"
    DAPR_GRPC_PORT: "50001"
    DAPR_PUBSUB_NAME: "pubsub-kafka"
    DAPR_STATE_STORE_NAME: "statestore-postgres"

  frontend:
    NEXT_PUBLIC_API_URL: "http://todoboard.local/api"
    NEXT_PUBLIC_APP_NAME: "TodoBoard (Minikube)"

#############################################################################
# Secrets Configuration
#############################################################################

secrets:
  # For Minikube, use simple secrets
  # In production, use proper secret management
  POSTGRES_PASSWORD: "todo_password"
  JWT_SECRET_KEY: "minikube-dev-secret-key-change-in-production"
  GROQ_API_KEY: ""  # Add your Groq API key here

#############################################################################
# PostgreSQL Configuration (Optional - for local DB)
#############################################################################

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"

  service:
    type: ClusterIP
    port: 5432

  env:
    POSTGRES_DB: "todo_db"
    POSTGRES_USER: "todo_user"
    POSTGRES_PASSWORD: "todo_password"

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  persistence:
    enabled: true
    size: 1Gi
    storageClass: "standard"

#############################################################################
# Monitoring Configuration
#############################################################################

monitoring:
  prometheus:
    enabled: false  # Disable for Minikube to save resources
  grafana:
    enabled: false  # Disable for Minikube to save resources

#############################################################################
# Pod Disruption Budget
#############################################################################

podDisruptionBudget:
  enabled: false  # Disable for Minikube (single node)

#############################################################################
# Network Policy
#############################################################################

networkPolicy:
  enabled: false  # Disable for Minikube for easier debugging
