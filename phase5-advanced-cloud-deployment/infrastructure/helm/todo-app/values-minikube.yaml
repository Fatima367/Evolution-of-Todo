# Minikube Values for TodoBoard Helm Chart
# This file contains configurations optimized for local Minikube deployment
# with reduced resource requirements and simplified setup

#############################################################################
# Global Configuration
#############################################################################

global:
  appName: todoboard
  environment: development
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  # Use local images (built with minikube docker-env)
  registry: ""

#############################################################################
# Backend Configuration (FastAPI)
#############################################################################

backend:
  enabled: true
  replicaCount: 1

  image:
    repository: todoboard-backend
    tag: "latest"
    pullPolicy: IfNotPresent

  containerPort: 8000

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  # Reduced resource limits for Minikube
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Health probes
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 20

  # Rolling update strategy
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

  # Autoscaling disabled for Minikube
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85

  # Dapr configuration
  dapr:
    enabled: true
    appId: backend-service
    appPort: 8000

  env:
    LOG_LEVEL: "DEBUG"
    ENVIRONMENT: "development"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true

  nodeSelector: {}
  tolerations: []
  affinity: {}

#############################################################################
# Frontend Configuration (Next.js)
#############################################################################

frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: todoboard-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  containerPort: 3000

  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000

  # Reduced resource limits for Minikube
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Health probes
  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

  # Rolling update strategy
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

  # Autoscaling disabled for Minikube
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85

  env:
    NODE_ENV: "development"
    NEXT_PUBLIC_APP_NAME: "TodoBoard (Minikube)"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true

  nodeSelector: {}
  tolerations: []
  affinity: {}

