# Production Cloud Values for TodoBoard Helm Chart
# This file contains production-grade configurations for cloud deployment
# Supports: Oracle Cloud (OKE), Google Cloud (GKE), Azure (AKS)

#############################################################################
# Global Configuration
#############################################################################

global:
  appName: todoboard
  environment: production
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  # Container registry (update with your registry)
  registry: "your-registry.io/todoboard"

#############################################################################
# Backend Configuration (FastAPI)
#############################################################################

backend:
  enabled: true
  replicaCount: 3

  image:
    repository: todoboard-backend
    tag: "latest"
    pullPolicy: IfNotPresent

  containerPort: 8000

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  # Production resource limits
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  # Health probes
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 30

  # Rolling update strategy
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Dapr configuration
  dapr:
    enabled: true
    appId: backend-service
    appPort: 8000

  env:
    LOG_LEVEL: "INFO"
    ENVIRONMENT: "production"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - backend
            topologyKey: kubernetes.io/hostname

#############################################################################
# Frontend Configuration (Next.js)
#############################################################################

frontend:
  enabled: true
  replicaCount: 2

  image:
    repository: todoboard-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  containerPort: 3000

  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000

  # Production resource limits
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # Health probes
  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 20

  # Rolling update strategy
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  env:
    NODE_ENV: "production"
    NEXT_PUBLIC_APP_NAME: "TodoBoard"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - frontend
            topologyKey: kubernetes.io/hostname

