apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: notification-service-reminders
  namespace: todoboard
spec:
  pubsubname: pubsub-kafka
  topic: reminders
  routes:
    default: /events/reminders
  scopes:
  - notification-service
  deadLetterTopic: dead-letter-queue
  bulkSubscribe:
    enabled: false
