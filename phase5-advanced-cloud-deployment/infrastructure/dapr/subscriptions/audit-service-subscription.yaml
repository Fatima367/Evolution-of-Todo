apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: audit-service-events
  namespace: todoboard
spec:
  pubsubname: pubsub-kafka
  topic: task-events
  routes:
    default: /events/task-events
  scopes:
  - audit-service
  deadLetterTopic: dead-letter-queue
  bulkSubscribe:
    enabled: false
