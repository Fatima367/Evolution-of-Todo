groups:
  - name: todoboard_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Service {{ $labels.service }} has error rate above 5% (current: {{ $value | humanizePercentage }})"

      # High latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "Service {{ $labels.service }} has p95 latency above 1s (current: {{ $value }}s)"

      # Pod not ready
      - alert: PodNotReady
        expr: |
          kube_pod_status_phase{namespace="todoboard", phase!="Running"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod not ready"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not running"

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          container_memory_usage_bytes{namespace="todoboard"}
          /
          container_spec_memory_limit_bytes{namespace="todoboard"}
          > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of memory limit"

      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          rate(container_cpu_usage_seconds_total{namespace="todoboard"}[5m])
          /
          container_spec_cpu_quota{namespace="todoboard"}
          * 100000
          > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value }}% of CPU limit"

      # Kafka lag
      - alert: KafkaConsumerLag
        expr: |
          kafka_consumergroup_lag > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag detected"
          description: "Consumer group {{ $labels.consumergroup }} has lag of {{ $value }} messages on topic {{ $labels.topic }}"

      # Database connection pool exhausted
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          db_connections_active >= 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool exhausted"
          description: "Database connection pool is at {{ $value }} connections"

      # Event publishing failures
      - alert: HighEventPublishingFailureRate
        expr: |
          sum(rate(events_failed_total[5m])) by (topic)
          /
          sum(rate(events_published_total[5m])) by (topic)
          > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High event publishing failure rate"
          description: "Topic {{ $labels.topic }} has failure rate above 10% (current: {{ $value | humanizePercentage }})"

      # WebSocket connection issues
      - alert: WebSocketConnectionDrop
        expr: |
          rate(websocket_connections_active[5m]) < -10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections dropping"
          description: "WebSocket connections are dropping at rate of {{ $value }} per second"

      # Deployment rollout stuck
      - alert: DeploymentRolloutStuck
        expr: |
          kube_deployment_status_replicas_updated{namespace="todoboard"}
          !=
          kube_deployment_spec_replicas{namespace="todoboard"}
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Deployment rollout stuck"
          description: "Deployment {{ $labels.deployment }} rollout has been stuck for 15 minutes"
