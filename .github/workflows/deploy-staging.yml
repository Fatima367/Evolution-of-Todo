name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  ENVIRONMENT: staging

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config use-context staging

      - name: Deploy with Helm
        run: |
          export KUBECONFIG=kubeconfig
          helm upgrade --install todoboard ./infrastructure/helm/todoboard \
            --namespace todoboard \
            --create-namespace \
            --values ./infrastructure/helm/todoboard/values-cloud.yaml \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set notificationService.image.tag=${{ github.sha }} \
            --set recurringTaskService.image.tag=${{ github.sha }} \
            --set auditService.image.tag=${{ github.sha }} \
            --wait --timeout 600s

      - name: Run database migrations
        run: |
          export KUBECONFIG=kubeconfig
          BACKEND_POD=$(kubectl get pod -n todoboard -l app.kubernetes.io/component=backend -o jsonpath="{.items[0].metadata.name}")
          kubectl exec -n todoboard $BACKEND_POD -- alembic upgrade head

      - name: Wait for deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl wait --for=condition=ready pod --all -n todoboard --timeout=600s

      - name: Run smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          INGRESS_IP=$(kubectl get ingress -n todoboard -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}')

          # Test frontend
          curl -f https://staging.todoboard.app || exit 1

          # Test backend health
          curl -f https://staging.todoboard.app/api/health || exit 1

          # Test backend readiness
          curl -f https://staging.todoboard.app/api/health/ready || exit 1

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Staging deployment successful",
              attachments: [{
                color: 'good',
                text: `Commit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\nURL: https://staging.todoboard.app`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Staging deployment failed",
              attachments: [{
                color: 'danger',
                text: `Commit: ${{ github.sha }}\nAuthor: ${{ github.actor }}`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
