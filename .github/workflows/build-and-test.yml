name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: todoboard
          POSTGRES_PASSWORD: todoboard
          POSTGRES_DB: todoboard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./phase5-advanced-cloud-deployment/backend
        run: |
          pip install uv
          uv pip install -r requirements.txt
          uv pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        working-directory: ./phase5-advanced-cloud-deployment/backend
        env:
          DATABASE_URL: postgresql://todoboard:todoboard@localhost:5432/todoboard_test
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./phase5-advanced-cloud-deployment/backend/coverage.xml
          flags: backend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./phase5-advanced-cloud-deployment/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./phase5-advanced-cloud-deployment/frontend
        run: npm ci

      - name: Run linter
        working-directory: ./phase5-advanced-cloud-deployment/frontend
        run: npm run lint

      - name: Run tests
        working-directory: ./phase5-advanced-cloud-deployment/frontend
        run: npm test -- --coverage

      - name: Build
        working-directory: ./phase5-advanced-cloud-deployment/frontend
        run: npm run build

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Python security scan
        working-directory: ./phase5-advanced-cloud-deployment/backend
        run: |
          pip install safety
          safety check --json

      - name: Run npm audit
        working-directory: ./phase5-advanced-cloud-deployment/frontend
        run: npm audit --audit-level=moderate

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan]

    strategy:
      matrix:
        service:
          - name: backend
            context: ./phase5-advanced-cloud-deployment/backend
          - name: frontend
            context: ./phase5-advanced-cloud-deployment/frontend
          - name: notification-service
            context: ./services/notification-service
          - name: recurring-task-service
            context: ./services/recurring-task-service
          - name: audit-service
            context: ./services/audit-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/todoboard-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/todoboard-${{ matrix.service.name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  helm-lint:
    name: Helm Chart Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Lint Helm chart
        run: |
          helm lint ./infrastructure/helm/todoboard
          helm template todoboard ./infrastructure/helm/todoboard --values ./infrastructure/helm/todoboard/values-local.yaml
