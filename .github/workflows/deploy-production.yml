name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (git tag or sha)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  ENVIRONMENT: production

jobs:
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    environment: production-approval

    steps:
      - name: Approval checkpoint
        run: echo "Deployment approved for version ${{ inputs.version }}"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config use-context production

      - name: Deploy with Helm
        run: |
          export KUBECONFIG=kubeconfig
          helm upgrade --install todoboard ./infrastructure/helm/todoboard \
            --namespace todoboard \
            --create-namespace \
            --values ./infrastructure/helm/todoboard/values-cloud.yaml \
            --set backend.image.tag=${{ inputs.version }} \
            --set frontend.image.tag=${{ inputs.version }} \
            --set notificationService.image.tag=${{ inputs.version }} \
            --set recurringTaskService.image.tag=${{ inputs.version }} \
            --set auditService.image.tag=${{ inputs.version }} \
            --wait --timeout 600s

      - name: Run database migrations
        run: |
          export KUBECONFIG=kubeconfig
          BACKEND_POD=$(kubectl get pod -n todoboard -l app.kubernetes.io/component=backend -o jsonpath="{.items[0].metadata.name}")
          kubectl exec -n todoboard $BACKEND_POD -- alembic upgrade head

      - name: Wait for deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl wait --for=condition=ready pod --all -n todoboard --timeout=600s

      - name: Health check
        id: health_check
        run: |
          # Test frontend
          curl -f https://todoboard.app || exit 1

          # Test backend health
          curl -f https://todoboard.app/api/health || exit 1

          # Test backend readiness
          curl -f https://todoboard.app/api/health/ready || exit 1

      - name: Rollback on failure
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          export KUBECONFIG=kubeconfig
          helm rollback todoboard -n todoboard

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Production deployment successful",
              attachments: [{
                color: 'good',
                text: `Version: ${{ inputs.version }}\nDeployed by: ${{ github.actor }}\nURL: https://todoboard.app`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Production deployment failed",
              attachments: [{
                color: 'danger',
                text: `Version: ${{ inputs.version }}\nDeployed by: ${{ github.actor }}\nRollback initiated`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
