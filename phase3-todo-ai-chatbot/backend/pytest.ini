[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = src
addopts =
    -v
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    contract: Contract tests
    security: Security tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
