apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secrets-k8s
  namespace: default
spec:
  type: secretstores.kubernetes
  version: v1
  metadata:
  # No additional metadata required for Kubernetes secret store
  # Secrets are automatically loaded from Kubernetes Secrets in the same namespace
scopes:
- backend
- notification-service
- recurring-task-service
- audit-service
