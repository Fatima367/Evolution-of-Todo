# Helm values for local Minikube deployment

# Global settings
global:
  environment: local
  domain: todoboard.local

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: todoboard-frontend
    tag: latest
    pullPolicy: Never  # Use local images in Minikube
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    NEXT_PUBLIC_API_URL: "http://todoboard.local/api"
    NEXT_PUBLIC_WS_URL: "ws://todoboard.local/ws"

# Backend configuration
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: todoboard-backend
    tag: latest
    pullPolicy: Never
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  env:
    DATABASE_URL: "postgresql://todoboard:todoboard@postgres:5432/todoboard"
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    REDIS_URL: "redis://redis:6379"
  dapr:
    enabled: true
    appId: "todoboard-backend"
    appPort: 8000
    appProtocol: "http"

# Notification service configuration
notificationService:
  enabled: true
  replicaCount: 1
  image:
    repository: notification-service
    tag: latest
    pullPolicy: Never
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    DATABASE_URL: "postgresql://todoboard:todoboard@postgres:5432/todoboard"
  dapr:
    enabled: true
    appId: "notification-service"
    appPort: 8001

# Recurring task service configuration
recurringTaskService:
  enabled: true
  replicaCount: 1
  image:
    repository: recurring-task-service
    tag: latest
    pullPolicy: Never
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    DATABASE_URL: "postgresql://todoboard:todoboard@postgres:5432/todoboard"
  dapr:
    enabled: true
    appId: "recurring-task-service"
    appPort: 8002

# Audit service configuration
auditService:
  enabled: true
  replicaCount: 1
  image:
    repository: audit-service
    tag: latest
    pullPolicy: Never
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    DATABASE_URL: "postgresql://todoboard:todoboard@postgres:5432/todoboard"
  dapr:
    enabled: true
    appId: "audit-service"
    appPort: 8003

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    username: todoboard
    password: todoboard
    database: todoboard
  primary:
    persistence:
      enabled: false  # Use ephemeral storage for local
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Redis configuration
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "250m"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: todoboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 3000
        - path: /api
          pathType: Prefix
          service: backend
          port: 8000
        - path: /ws
          pathType: Prefix
          service: backend
          port: 8000

# Dapr components
dapr:
  components:
    pubsub:
      enabled: true
      type: pubsub.kafka
      metadata:
        - name: brokers
          value: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: authType
          value: "none"
    statestore:
      enabled: true
      type: state.postgresql
      metadata:
        - name: connectionString
          value: "host=postgres user=todoboard password=todoboard dbname=todoboard port=5432 sslmode=disable"
