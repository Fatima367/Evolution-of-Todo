apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todoboard.fullname" . }}-secrets
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: "your-secret-key-change-in-production"
  database-password: "todoboard"
  vapid-public-key: "your-vapid-public-key"
  vapid-private-key: "your-vapid-private-key"
