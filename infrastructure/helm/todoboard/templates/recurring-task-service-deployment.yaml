apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todoboard.fullname" . }}-recurring-task-service
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: recurring-task-service
spec:
  replicas: {{ .Values.recurringTaskService.replicaCount }}
  selector:
    matchLabels:
      {{- include "todoboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: recurring-task-service
  template:
    metadata:
      labels:
        {{- include "todoboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: recurring-task-service
      annotations:
        {{- if .Values.recurringTaskService.dapr.enabled }}
        dapr.io/enabled: "true"
        dapr.io/app-id: "{{ .Values.recurringTaskService.dapr.appId }}"
        dapr.io/app-port: "{{ .Values.recurringTaskService.dapr.appPort }}"
        {{- end }}
    spec:
      containers:
      - name: recurring-task-service
        image: "{{ .Values.recurringTaskService.image.repository }}:{{ .Values.recurringTaskService.image.tag }}"
        imagePullPolicy: {{ .Values.recurringTaskService.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8002
          protocol: TCP
        env:
        {{- range $key, $value := .Values.recurringTaskService.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.recurringTaskService.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todoboard.fullname" . }}-recurring-task-service
  labels:
    {{- include "todoboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: recurring-task-service
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "todoboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: recurring-task-service
