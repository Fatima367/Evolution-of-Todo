# Helm values for cloud production deployment

# Global settings
global:
  environment: production
  domain: todoboard.app

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/your-org/todoboard-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NEXT_PUBLIC_API_URL: "https://todoboard.app/api"
    NEXT_PUBLIC_WS_URL: "wss://todoboard.app/ws"

# Backend configuration
backend:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/your-org/todoboard-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    DATABASE_URL: "postgresql://todoboard:${DB_PASSWORD}@postgres-primary:5432/todoboard?sslmode=require"
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    REDIS_URL: "redis://redis-master:6379"
  dapr:
    enabled: true
    appId: "todoboard-backend"
    appPort: 8000
    appProtocol: "http"

# Notification service configuration
notificationService:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/your-org/notification-service
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    DATABASE_URL: "postgresql://todoboard:${DB_PASSWORD}@postgres-primary:5432/todoboard?sslmode=require"
  dapr:
    enabled: true
    appId: "notification-service"
    appPort: 8001

# Recurring task service configuration
recurringTaskService:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/your-org/recurring-task-service
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    DATABASE_URL: "postgresql://todoboard:${DB_PASSWORD}@postgres-primary:5432/todoboard?sslmode=require"
  dapr:
    enabled: true
    appId: "recurring-task-service"
    appPort: 8002

# Audit service configuration
auditService:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/your-org/audit-service
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    KAFKA_BOOTSTRAP_SERVERS: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    DATABASE_URL: "postgresql://todoboard:${DB_PASSWORD}@postgres-primary:5432/todoboard?sslmode=require"
  dapr:
    enabled: true
    appId: "audit-service"
    appPort: 8003

# PostgreSQL configuration (use managed service in production)
postgresql:
  enabled: false  # Use cloud-managed PostgreSQL

# Redis configuration (use managed service in production)
redis:
  enabled: false  # Use cloud-managed Redis

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    - secretName: todoboard-tls
      hosts:
        - todoboard.app
  hosts:
    - host: todoboard.app
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 3000
        - path: /api
          pathType: Prefix
          service: backend
          port: 8000
        - path: /ws
          pathType: Prefix
          service: backend
          port: 8000

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network Policy
networkPolicy:
  enabled: true

# Dapr components
dapr:
  components:
    pubsub:
      enabled: true
      type: pubsub.kafka
      metadata:
        - name: brokers
          value: "todoboard-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: authType
          value: "none"
    statestore:
      enabled: true
      type: state.postgresql
      metadata:
        - name: connectionString
          secretKeyRef:
            name: todoboard-secrets
            key: database-connection-string
