### Tool: delete_task

**Purpose**: Delete a task for a user.

**Input Schema**:

| Parameter | Type | Required | Description | Example |
|-----------|------|-----------|-------------|---------|
| user_id | string | Yes | The user identifier | "ziakhan" |
| task_id | integer | Yes | The task ID to delete | 2 |

**Output Schema**:

| Field | Type | Description | Example |
|-------|------|-------------|---------|
| task_id | integer | The deleted task ID | 2 |
| status | string | Operation result: "deleted" | "deleted" |
| title | string | The deleted task title | "Old task" |

**Example Call**:

```json
{
  "tool": "delete_task",
  "parameters": {
    "user_id": "ziakhan",
    "task_id": 2
  }
}
```

**Example Response**:

```json
{
  "task_id": 2,
  "status": "deleted",
  "title": "Old task"
}
```

**Error Cases**:
- Task not found → 404: "Task not found"
- User not authorized for task → 403: "You don't have permission to modify this task"

---

### Tool: update_task

**Purpose**: Modify a task's title or description for a user.

**Input Schema**:

| Parameter | Type | Required | Description | Example |
|-----------|------|-----------|-------------|---------|
| user_id | string | Yes | The user identifier | "ziakhan" |
| task_id | integer | Yes | The task ID to update | 1 |
| title | string | No | New task title (1-500 chars) | "Buy groceries and fruits" |
| description | string | No | New task description (up to 2000 chars) | "Milk, eggs, bread, apples, bananas" |

**Note**: At least one of `title` or `description` must be provided.

**Output Schema**:

| Field | Type | Description | Example |
|-------|------|-------------|---------|
| task_id | integer | The updated task ID | 1 |
| status | string | Operation result: "updated" | "updated" |
| title | string | The updated task title | "Buy groceries and fruits" |

**Example Call**:

```json
{
  "tool": "update_task",
  "parameters": {
    "user_id": "ziakhan",
    "task_id": 1,
    "title": "Buy groceries and fruits"
  }
}
```

**Example Response**:

```json
{
  "task_id": 1,
  "status": "updated",
  "title": "Buy groceries and fruits"
}
```

**Error Cases**:
- Task not found → 404: "Task not found"
- No updates provided → 400: "At least one of title or description must be provided"
- User not authorized for task → 403: "You don't have permission to modify this task"

## Common Error Response

All tools return a consistent error response structure:

```json
{
  "error": {
    "code": "ERROR_CODE",
    "message": "Human-readable error message",
    "details": { /* additional context */ }
  }
}
```

**Error Codes**:

| Code | Description | HTTP Status |
|------|-------------|--------------|
| VALIDATION_ERROR | Invalid input parameters | 400 |
| NOT_FOUND | Resource (user/task) not found | 404 |
| FORBIDDEN | User not authorized for resource | 403 |
| INTERNAL_ERROR | Unexpected server error | 500 |

## MCP Server Interface

### Capabilities

The MCP server declares the following capabilities:

```json
{
  "name": "todo-tools",
  "version": "1.0.0",
  "capabilities": {
    "tools": {
      "listChanged": false
    }
  },
  "tools": [
    {
      "name": "add_task",
      "description": "Create a new task for a user",
      "inputSchema": {
        "type": "object",
        "properties": {
          "user_id": {
            "type": "string",
            "description": "The user identifier"
          },
          "title": {
            "type": "string",
            "description": "The task title (1-500 characters)",
            "minLength": 1,
            "maxLength": 500
          },
          "description": {
            "type": "string",
            "description": "Optional task description (up to 2000 characters)",
            "maxLength": 2000
          }
        },
        "required": ["user_id", "title"]
      }
    },
    {
      "name": "list_tasks",
      "description": "Retrieve tasks for a user with optional status filtering",
      "inputSchema": {
        "type": "object",
        "properties": {
          "user_id": {
            "type": "string",
            "description": "The user identifier"
          },
          "status": {
            "type": "string",
            "enum": ["all", "pending", "completed"],
            "description": "Filter by status",
            "default": "all"
          }
        },
        "required": ["user_id"]
      }
    },
    {
      "name": "complete_task",
      "description": "Mark a task as completed for a user",
      "inputSchema": {
        "type": "object",
        "properties": {
          "user_id": {
            "type": "string",
            "description": "The user identifier"
          },
          "task_id": {
            "type": "integer",
            "description": "The task ID to complete"
          }
        },
        "required": ["user_id", "task_id"]
      }
    },
    {
      "name": "delete_task",
      "description": "Delete a task for a user",
      "inputSchema": {
        "type": "object",
        "properties": {
          "user_id": {
            "type": "string",
            "description": "The user identifier"
          },
          "task_id": {
            "type": "integer",
            "description": "The task ID to delete"
          }
        },
        "required": ["user_id", "task_id"]
      }
    },
    {
      "name": "update_task",
      "description": "Modify a task's title or description for a user",
      "inputSchema": {
        "type": "object",
        "properties": {
          "user_id": {
            "type": "string",
            "description": "The user identifier"
          },
          "task_id": {
            "type": "integer",
            "description": "The task ID to update"
          },
          "title": {
            "type": "string",
            "description": "New task title (1-500 characters)",
            "minLength": 1,
            "maxLength": 500
          },
          "description": {
            "type": "string",
            "description": "New task description (up to 2000 characters)",
            "maxLength": 2000
          }
        },
        "required": ["user_id", "task_id"]
      }
    }
  ]
}
```

## Tool Selection Guidelines

The AI agent should select tools based on user intent:

| User Says | Intent | Tool |
|-----------|-------|------|
| "Add a task to..." | Create new task | `add_task` |
| "Create task: ..." | Create new task | `add_task` |
| "I need to remember..." | Create new task | `add_task` |
| "Show me my tasks" | List all tasks | `list_tasks(status="all")` |
| "What's pending?" | List pending tasks | `list_tasks(status="pending")` |
| "What have I completed?" | List completed tasks | `list_tasks(status="completed")` |
| "Mark task 3 done" | Complete task | `complete_task` |
| "Complete task #5" | Complete task | `complete_task` |
| "Delete task 2" | Delete task | `delete_task` |
| "Remove the meeting task" | Delete by name (requires list first) | `list_tasks` then `delete_task` |
| "Change task 1 to..." | Update task | `update_task` |
| "Edit task description" | Update task | `update_task` |
| "Rename the task..." | Update task | `update_task` |

## Idempotency

| Operation | Idempotent? | Notes |
|-----------|----------------|-------|
| add_task | No | Creates new task each call |
| list_tasks | Yes | Same result for same inputs |
| complete_task | Yes | Calling on already-completed task returns success |
| delete_task | No | Deletes task each call (404 after first) |
| update_task | Yes | Same result for same inputs |
