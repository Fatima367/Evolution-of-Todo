# MCP Tools Specification

**Feature**: 003-todo-ai-chatbot
**Version**: 1.0.0
**Protocol**: Model Context Protocol (MCP)

## Overview

This document defines the MCP tools that expose task management operations to the AI agent. Each tool maps to a specific task CRUD operation with defined input/output schemas.

## Tool Definitions

### Tool: add_task

**Purpose**: Create a new task for a user.

**Input Schema**:

| Parameter | Type | Required | Description | Example |
|-----------|------|-----------|-------------|---------|
| user_id | string | Yes | The user identifier | "ziakhan" |
| title | string | Yes | The task title (1-500 chars) | "Buy groceries" |
| description | string | No | Optional task description (up to 2000 chars) | "Milk, eggs, bread" |

**Output Schema**:

| Field | Type | Description | Example |
|-------|------|-------------|---------|
| task_id | integer | The newly created task ID | 5 |
| status | string | Operation result: "created" | "created" |
| title | string | The created task title | "Buy groceries" |

**Example Call**:

```json
{
  "tool": "add_task",
  "parameters": {
    "user_id": "ziakhan",
    "title": "Buy groceries",
    "description": "Milk, eggs, bread"
  }
}
```

**Example Response**:

```json
{
  "task_id": 5,
  "status": "created",
  "title": "Buy groceries"
}
```

**Error Cases**:
- Title empty → 400: "Title is required"
- User not found → 404: "User not found"

---

### Tool: list_tasks

**Purpose**: Retrieve tasks for a user with optional status filtering.

**Input Schema**:

| Parameter | Type | Required | Description | Example |
|-----------|------|-----------|-------------|---------|
| user_id | string | Yes | The user identifier | "ziakhan" |
| status | string | No | Filter by status: "all", "pending", "completed". Default: "all" | "pending" |

**Output Schema**:

```json
[
  {
    "id": integer,
    "title": string,
    "description": string or null,
    "completed": boolean,
    "created_at": string (ISO 8601),
    "updated_at": string (ISO 8601)
  }
]
```

**Example Call**:

```json
{
  "tool": "list_tasks",
  "parameters": {
    "user_id": "ziakhan",
    "status": "pending"
  }
}
```

**Example Response**:

```json
[
  {
    "id": 1,
    "title": "Buy groceries",
    "description": "Milk, eggs, bread",
    "completed": false,
    "created_at": "2025-12-28T10:00:00Z",
    "updated_at": "2025-12-28T10:00:00Z"
  },
  {
    "id": 2,
    "title": "Call mom",
    "description": null,
    "completed": false,
    "created_at": "2025-12-28T11:00:00Z",
    "updated_at": "2025-12-28T11:00:00Z"
  }
]
```

**Error Cases**:
- User not found → 404: "User not found"
- Invalid status → 400: "Invalid status. Must be 'all', 'pending', or 'completed'"

---

### Tool: complete_task

**Purpose**: Mark a task as completed for a user.

**Input Schema**:

| Parameter | Type | Required | Description | Example |
|-----------|------|-----------|-------------|---------|
| user_id | string | Yes | The user identifier | "ziakhan" |
| task_id | integer | Yes | The task ID to complete | 3 |

**Output Schema**:

| Field | Type | Description | Example |
|-------|------|-------------|---------|
| task_id | integer | The completed task ID | 3 |
| status | string | Operation result: "completed" | "completed" |
| title | string | The task title | "Call mom" |

**Example Call**:

```json
{
  "tool": "complete_task",
  "parameters": {
    "user_id": "ziakhan",
    "task_id": 3
  }
}
```

**Example Response**:

```json
{
  "task_id": 3,
  "status": "completed",
  "title": "Call mom"
}
```

**Error Cases**:
- Task not found → 404: "Task not found"
- Task already completed → 200: Returns success (idempotent)
- User not authorized for task → 403: "You don't have permission to modify this task"

