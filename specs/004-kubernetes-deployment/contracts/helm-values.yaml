### PostgreSQL Configuration

```json
{
  "type": "object",
  "properties": {
    "postgres": {
      "type": "object",
      "description": "PostgreSQL deployment configuration",
      "properties": {
        "enabled": { "type": "boolean", "default": true },
        "replicaCount": { "type": "integer", "minimum": 1, "maximum": 1, "default": 1 },
        "image": {
          "type": "object",
          "properties": {
            "repository": { "type": "string", "default": "postgres" },
            "tag": { "type": "string", "default": "16" },
            "pullPolicy": { "type": "string", "enum": ["Always", "IfNotPresent", "Never"] }
          }
        },
        "service": {
          "type": "object",
          "properties": {
            "type": { "type": "string", "enum": ["ClusterIP"], "default": "ClusterIP" },
            "port": { "type": "integer", "default": 5432 }
          }
        },
        "persistence": {
          "type": "object",
          "properties": {
            "enabled": { "type": "boolean", "default": true },
            "storageClass": { "type": "string", "default": "standard" },
            "size": { "type": "string", "pattern": "^[0-9]+(Gi|Ti)$", "default": "1Gi" }
          }
        },
        "resources": {
          "type": "object",
          "properties": {
            "requests": {
              "type": "object",
              "properties": {
                "memory": { "type": "string", "pattern": "^[0-9]+(Mi|Gi)$" },
                "cpu": { "type": "string", "pattern": "^[0-9]+m?$" }
              }
            },
            "limits": {
              "type": "object",
              "properties": {
                "memory": { "type": "string", "pattern": "^[0-9]+(Mi|Gi)$" },
                "cpu": { "type": "string", "pattern": "^[0-9]+m?$" }
              }
            }
          }
        }
      }
    }
  }
}
```

## Default Values (values.yaml)

```yaml
global:
  imagePullPolicy: "IfNotPresent"
  imageRegistry: ""
  namespace: "todoboard"

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: "todoboard-frontend"
    tag: "latest"
    pullPolicy: "IfNotPresent"
  service:
    type: "LoadBalancer"
    port: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env: []

backend:
  enabled: true
  replicaCount: 2
  image:
    repository: "todoboard-backend"
    tag: "latest"
    pullPolicy: "IfNotPresent"
  service:
    type: "ClusterIP"
    port: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  env: []

postgres:
  enabled: true
  replicaCount: 1
  image:
    repository: "postgres"
    tag: "16"
    pullPolicy: "IfNotPresent"
  service:
    type: "ClusterIP"
    port: 5432
  persistence:
    enabled: true
    storageClass: "standard"
    size: "1Gi"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env: []

ingress:
  enabled: false
```

## Minikube Overrides (values-minikube.yaml)

```yaml
# Use LoadBalancer with Minikube tunnel
frontend:
  service:
    type: "LoadBalancer"

# Use standard storage class for Minikube
postgres:
  persistence:
    storageClass: "standard"
```
