# Helm Values Schema: todoboard Chart

## Overview

This document defines the configuration contract for the `todoboard` Helm chart. All values must conform to this schema.

## Schema

### Global Configuration

```json
{
  "type": "object",
  "properties": {
    "global": {
      "type": "object",
      "description": "Global settings applied to all resources",
      "properties": {
        "imagePullPolicy": {
          "type": "string",
          "enum": ["Always", "IfNotPresent", "Never"],
          "default": "IfNotPresent"
        },
        "imageRegistry": {
          "type": "string",
          "description": "Docker registry prefix (empty for local images)",
          "default": ""
        },
        "namespace": {
          "type": "string",
          "description": "Target namespace",
          "default": "todoboard"
        }
      }
    }
  }
}
```

### Frontend Configuration

```json
{
  "type": "object",
  "properties": {
    "frontend": {
      "type": "object",
      "description": "Frontend deployment configuration",
      "properties": {
        "enabled": {
          "type": "boolean",
          "description": "Enable frontend deployment",
          "default": true
        },
        "replicaCount": {
          "type": "integer",
          "description": "Number of replicas",
          "minimum": 1,
          "default": 2
        },
        "image": {
          "type": "object",
          "properties": {
            "repository": { "type": "string", "default": "todoboard-frontend" },
            "tag": { "type": "string", "default": "latest" },
            "pullPolicy": {
              "type": "string",
              "enum": ["Always", "IfNotPresent", "Never"],
              "default": "IfNotPresent"
            }
          }
        },
        "service": {
          "type": "object",
          "properties": {
            "type": {
              "type": "string",
              "enum": ["ClusterIP", "NodePort", "LoadBalancer"],
              "description": "Service type for frontend",
              "default": "LoadBalancer"
            },
            "port": {
              "type": "integer",
              "description": "Service port",
              "default": 3000
            }
          }
        },
        "resources": {
          "type": "object",
          "description": "Resource requests and limits",
          "properties": {
            "requests": {
              "type": "object",
              "properties": {
                "memory": { "type": "string", "pattern": "^[0-9]+(Mi|Gi)$" },
                "cpu": { "type": "string", "pattern": "^[0-9]+m?$" }
              }
            },
            "limits": {
              "type": "object",
              "properties": {
                "memory": { "type": "string", "pattern": "^[0-9]+(Mi|Gi)$" },
                "cpu": { "type": "string", "pattern": "^[0-9]+m?$" }
              }
            }
          }
        },
        "env": {
          "type": "array",
          "description": "Environment variables",
          "items": {
            "type": "object",
            "oneOf": [
              {
                "properties": {
                  "name": { "type": "string" },
                  "value": { "type": "string" }
                }
              },
              {
                "properties": {
                  "name": { "type": "string" },
                  "valueFrom": {
                    "type": "object",
                    "properties": {
                      "secretKeyRef": {
                        "type": "object",
                        "properties": {
                          "name": { "type": "string" },
                          "key": { "type": "string" }
                        }
                      }
                    }
                  }
                }
              }
            ]
          }
        }
      }
    }
  }
}
```

